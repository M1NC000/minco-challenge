[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[dev]
  functions = "netlify/functions"

# Scheduled function - každých 30 sekúnd
[[plugins]]
  package = "@netlify/plugin-functions"

[functions.auto-sync]
  schedule = "*/30 * * * * *"
